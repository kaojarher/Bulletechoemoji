<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🔫 Bullet Echo · 暗影回聲 (重新武裝置頂)</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b0e14;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Arial', sans-serif;
      touch-action: none;
      overflow: hidden;
    }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100vh;
      margin: 0;
      padding: 0;
      background: transparent;
      touch-action: none;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      touch-action: none;
    }
    /* 狀態列下移，為頂部按鈕留出空間 */
    .status-row {
      position: absolute;
      top: 60px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      color: #f0e9dd;
      text-shadow: 0 2px 5px black;
      font-weight: bold;
      font-size: 1.2rem;
      pointer-events: none;
      z-index: 10;
    }
    .hp-box, .score-box, .weapon-box {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #1e2632c0;
      padding: 5px 16px;
      border-radius: 32px;
      border: 1px solid #c9aa7b;
      backdrop-filter: blur(2px);
    }
    /* 重新武裝按鈕移至最上方 */
    button {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: #2f3e55;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      padding: 6px 28px;
      border-radius: 48px;
      box-shadow: 0 5px 0 #0f141c, 0 2px 12px black;
      cursor: pointer;
      border: 1px solid #b9a98a;
      backdrop-filter: blur(4px);
      background: #2e425bb0;
      touch-action: manipulation;
      z-index: 20;
    }
    button:active {
      transform: translateX(-50%) translateY(4px);
      box-shadow: 0 3px 0 #0f141c, 0 2px 8px black;
    }
  </style>
</head>
<body>
<div class="game-container">
  <canvas id="gameCanvas" width="700" height="1200"></canvas>
  
  <div class="status-row">
    <div class="hp-box">
      <span>❤️</span> <span id="hpDisplay">5</span>
    </div>
    <div class="weapon-box" id="weaponBox">
      <span id="weaponEmoji">🔫</span> <span id="weaponName">手槍</span>
    </div>
    <div class="score-box">
      <span>🎯</span> <span id="scoreDisplay">0</span>
    </div>
  </div>
  
  <button id="restartButton">💀 重新武裝 💀</button>
</div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const hpDisplay = document.getElementById('hpDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const weaponEmoji = document.getElementById('weaponEmoji');
    const weaponName = document.getElementById('weaponName');
    const restartBtn = document.getElementById('restartButton');

    // 豎屏邏輯尺寸
    const W = 700, H = 1200;
    canvas.width = W; canvas.height = H;

    let gameActive = true;
    let gameOver = false;
    let frame;

    const player = {
      x: 350, y: 600,
      r: 18,
      hp: 5,
      speed: 4.8,
      invincible: false,
      invTimer: 0,
      currentWeapon: 'pistol'
    };

    const weaponTypes = {
      pistol: {
        name: '手槍', emoji: '🔫',
        cooldown: 12,
        bulletSpeed: 7.5,
        bulletRadius: 6,
        damage: 1,
        pattern: 'single',
        spreadAngle: 0,
        bulletCount: 1
      },
      shotgun: {
        name: '霰彈槍', emoji: '💥',
        cooldown: 32,
        bulletSpeed: 6.8,
        bulletRadius: 6,
        damage: 1,
        pattern: 'spread',
        spreadAngle: 0.35,
        bulletCount: 5
      },
      machinegun: {
        name: '機關槍', emoji: '🔥',
        cooldown: 6,
        bulletSpeed: 8.0,
        bulletRadius: 5,
        damage: 1,
        pattern: 'single',
        spreadAngle: 0.08,
        bulletCount: 1
      },
      rifle: {
        name: '步槍', emoji: '🎯',
        cooldown: 18,
        bulletSpeed: 9.5,
        bulletRadius: 7,
        damage: 2,
        pattern: 'single',
        spreadAngle: 0,
        bulletCount: 1
      }
    };

    let shootCooldown = 0;

    const joystick = {
      active: false,
      originX: 0, originY: 0,
      vectorX: 0, vectorY: 0,
      maxDist: 96,
      centerX: W * 0.5,
      centerY: H - 180,
      fireRadius: 44,
      activateRadius: 220
    };
    let shootPressed = false;

    let bullets = [];
    let enemies = [];
    let obstacles = [];
    let pickups = [];

    let score = 0;
    let enemySpawnTimer = 0;
    const ENEMY_SPAWN_RATE = 60;
    const MAX_ENEMIES = 7;

    const enemyTypes = [
      { name: '普通', emoji: '👾', hp: 1, speed: 1.25, r: 18, score: 10, color: '#ff4466' },
      { name: '快速', emoji: '🏃', hp: 1, speed: 2.2,  r: 16, score: 15, color: '#66ff66' },
      { name: '重型', emoji: '🦍', hp: 3, speed: 0.9,  r: 24, score: 30, color: '#cc8844' },
      { name: '爆炸', emoji: '💣', hp: 1, speed: 1.5,  r: 19, score: 20, color: '#ff3333', explode: true }
    ];

    function initWorld() {
      player.x = 350; player.y = 600;
      player.hp = 5;
      player.invincible = false;
      player.invTimer = 0;
      player.currentWeapon = 'pistol';
      
      bullets = [];
      enemies = [];
      pickups = [];
      score = 0;
      updateDisplay();
      
      generateObstacles();
      
      for (let i = 0; i < 3; i++) spawnEnemyImmediate();
      
      shootCooldown = 0;
      enemySpawnTimer = ENEMY_SPAWN_RATE;
      gameActive = true;
      gameOver = false;
      
      joystick.active = false;
      joystick.vectorX = 0; joystick.vectorY = 0;
      shootPressed = false;
    }

    function generateObstacles() {
      obstacles = [
        { x: 150, y: 180, r: 32, emoji: '🪨' },
        { x: 550, y: 200, r: 34, emoji: '🧱' },
        { x: 200, y: 500, r: 38, emoji: '🪵' },
        { x: 500, y: 550, r: 36, emoji: '🪨' },
        { x: 350, y: 300, r: 30, emoji: '⬛' },
        { x: 100, y: 700, r: 28, emoji: '🧱' },
        { x: 600, y: 750, r: 30, emoji: '🪨' },
        { x: 250, y: 900, r: 25, emoji: '🪵' },
        { x: 450, y: 950, r: 28, emoji: '🧱' }
      ];
    }

    function spawnEnemyImmediate() {
      let tries = 0;
      let maxTries = 150;
      let spawned = false;
      while (tries < maxTries && !spawned) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 230 + Math.random() * 400;
        const x = player.x + Math.cos(angle) * dist;
        const y = player.y + Math.sin(angle) * dist;
        if (x < 50 || x > W-50 || y < 50 || y > H-50) { tries++; continue; }
        const dxp = x - player.x, dyp = y - player.y;
        if (Math.hypot(dxp, dyp) < 220) { tries++; continue; }
        let overlap = false;
        for (let ob of obstacles) {
          const dx = x - ob.x, dy = y - ob.y;
          if (dx*dx + dy*dy < (30+ob.r+12)**2) { overlap = true; break; }
        }
        if (overlap) { tries++; continue; }
        let tooClose = false;
        for (let e of enemies) {
          if (Math.hypot(x - e.x, y - e.y) < 55) { tooClose = true; break; }
        }
        if (tooClose) { tries++; continue; }
        
        const typeIndex = Math.floor(Math.random() * enemyTypes.length);
        const type = enemyTypes[typeIndex];
        enemies.push({
          x, y,
          r: type.r,
          hp: type.hp,
          speed: type.speed,
          emoji: type.emoji,
          score: type.score,
          explode: type.explode || false,
          color: type.color
        });
        spawned = true;
      }
      if (!spawned) {
        const type = enemyTypes[0];
        enemies.push({ x: 80+Math.random()*540, y: 80+Math.random()*1040, r: type.r, hp: type.hp, speed: type.speed, emoji: type.emoji, score: type.score, explode: false, color: type.color });
      }
    }

    function updateDisplay() {
      hpDisplay.textContent = player.hp;
      scoreDisplay.textContent = score;
      const wp = weaponTypes[player.currentWeapon];
      weaponEmoji.textContent = wp.emoji;
      weaponName.textContent = wp.name;
    }

    function circlesCollide(x1,y1,r1,x2,y2,r2) {
      return (x1-x2)**2 + (y1-y2)**2 < (r1+r2)**2;
    }

    function resolvePlayerCollision(nx, ny) {
      let rx = Math.max(player.r+2, Math.min(W-player.r-2, nx));
      let ry = Math.max(player.r+2, Math.min(H-player.r-2, ny));
      for (let ob of obstacles) {
        const dx = rx - ob.x, dy = ry - ob.y;
        const dist = Math.hypot(dx, dy);
        const minDist = player.r + ob.r;
        if (dist < minDist) {
          const ang = Math.atan2(dy, dx);
          rx += Math.cos(ang) * (minDist - dist);
          ry += Math.sin(ang) * (minDist - dist);
        }
      }
      return { x: Math.max(player.r+2, Math.min(W-player.r-2, rx)), 
               y: Math.max(player.r+2, Math.min(H-player.r-2, ry)) };
    }

    function resolveEnemyCollision(e, nx, ny, idx) {
      let rx = Math.max(e.r+4, Math.min(W-e.r-4, nx));
      let ry = Math.max(e.r+4, Math.min(H-e.r-4, ny));
      for (let ob of obstacles) {
        const dx = rx - ob.x, dy = ry - ob.y;
        const dist = Math.hypot(dx, dy);
        const min = e.r + ob.r;
        if (dist < min) {
          const ang = Math.atan2(dy, dx);
          rx += Math.cos(ang) * (min - dist);
          ry += Math.sin(ang) * (min - dist);
        }
      }
      for (let i=0; i<enemies.length; i++) {
        if (i===idx) continue;
        const o = enemies[i];
        const dx = rx - o.x, dy = ry - o.y;
        const min = e.r + o.r;
        if (dx*dx+dy*dy < min*min) {
          const ang = Math.atan2(dy, dx);
          const overlap = min - Math.hypot(dx,dy);
          rx += Math.cos(ang) * overlap * 0.5;
          ry += Math.sin(ang) * overlap * 0.5;
        }
      }
      return { x: Math.max(e.r+4, Math.min(W-e.r-4, rx)), 
               y: Math.max(e.r+4, Math.min(H-e.r-4, ry)) };
    }

    function healPlayer(amount) {
      if (!gameActive) return;
      player.hp += amount;
      updateDisplay();
    }

    function damagePlayer(amount) {
      if (player.invincible || !gameActive || player.hp<=0) return;
      player.hp = Math.max(0, player.hp - amount);
      player.invincible = true;
      player.invTimer = 48;
      updateDisplay();
      if (player.hp <= 0) {
        gameActive = false;
        gameOver = true;
      }
    }

    function getAimTarget() {
      let minDist = Infinity;
      let target = null;
      for (let e of enemies) {
        const dx = e.x - player.x, dy = e.y - player.y;
        const dist = Math.hypot(dx, dy);
        if (dist < minDist) { minDist = dist; target = e; }
      }
      return target;
    }

    function shootBullet() {
      if (!gameActive) return;
      const aim = getAimTarget();
      let targetX, targetY;
      if (aim) { targetX = aim.x; targetY = aim.y; }
      else { targetX = player.x + 40; targetY = player.y; }
      
      const dx = targetX - player.x;
      const dy = targetY - player.y;
      const len = Math.hypot(dx, dy);
      if (len < 0.001) return;
      const baseAngle = Math.atan2(dy, dx);
      
      const wp = weaponTypes[player.currentWeapon];
      const count = wp.bulletCount;
      const spread = wp.spreadAngle;
      
      for (let i = 0; i < count; i++) {
        let angle = baseAngle;
        if (wp.pattern === 'spread') {
          angle += spread * (i / (count-1) - 0.5) * 2;
        } else if (spread > 0) {
          angle += (Math.random() - 0.5) * spread * 2;
        }
        const vx = Math.cos(angle) * wp.bulletSpeed;
        const vy = Math.sin(angle) * wp.bulletSpeed;
        
        bullets.push({
          x: player.x + Math.cos(baseAngle) * (player.r+7),
          y: player.y + Math.sin(baseAngle) * (player.r+7),
          vx, vy,
          r: wp.bulletRadius,
          damage: wp.damage,
          emoji: wp.emoji,
          life: 100
        });
      }
    }

    function spawnPickup(x, y, type) {
      if (type === 'weapon') {
        const weaponList = ['pistol', 'shotgun', 'machinegun', 'rifle'];
        const notCurrent = weaponList.filter(w => w !== player.currentWeapon);
        const chosen = notCurrent.length ? notCurrent[Math.floor(Math.random() * notCurrent.length)] : weaponList[0];
        pickups.push({
          x, y, r: 18, type: 'weapon', weaponType: chosen,
          emoji: '🎁', life: 420
        });
      } else if (type === 'health') {
        pickups.push({
          x, y, r: 16, type: 'health', healAmount: 1,
          emoji: '❤️', life: 400
        });
      }
    }

    function update() {
      if (!gameActive) return;
      
      if (joystick.active) {
        const moveX = joystick.vectorX * player.speed;
        const moveY = joystick.vectorY * player.speed;
        const res = resolvePlayerCollision(player.x + moveX, player.y + moveY);
        player.x = res.x; player.y = res.y;
      }
      
      if (player.invincible) {
        player.invTimer--;
        if (player.invTimer <= 0) player.invincible = false;
      }
      
      if (shootCooldown > 0) shootCooldown--;
      if (shootPressed && gameActive && shootCooldown <= 0) {
        shootBullet();
        shootCooldown = weaponTypes[player.currentWeapon].cooldown;
      }
      
      for (let i=0; i<enemies.length; i++) {
        const e = enemies[i];
        const dx = player.x - e.x, dy = player.y - e.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 0.5) {
          const move = Math.min(e.speed, dist);
          const stepX = (dx/dist)*move, stepY = (dy/dist)*move;
          const res = resolveEnemyCollision(e, e.x+stepX, e.y+stepY, i);
          e.x = res.x; e.y = res.y;
        }
      }
      
      for (let i=bullets.length-1; i>=0; i--) {
        const b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        b.life--;
        if (b.x<-30||b.x>W+30||b.y<-30||b.y>H+30||b.life<=0) {
          bullets.splice(i,1); continue;
        }
        let hitObs = false;
        for (let ob of obstacles) if (circlesCollide(b.x,b.y,b.r,ob.x,ob.y,ob.r)) { hitObs=true; break; }
        if (hitObs) { bullets.splice(i,1); continue; }
        
        let used = false;
        for (let j=0; j<enemies.length; j++) {
          const e = enemies[j];
          if (circlesCollide(b.x,b.y,b.r, e.x,e.y,e.r)) {
            e.hp -= b.damage;
            used = true;
            if (e.hp <= 0) {
              score += e.score;
              updateDisplay();
              if (e.explode && Math.hypot(player.x-e.x, player.y-e.y) < 90) {
                damagePlayer(1);
              }
              const roll = Math.random();
              if (roll < 0.25) {
                spawnPickup(e.x, e.y, 'weapon');
              } else if (roll < 0.55) {
                spawnPickup(e.x, e.y, 'health');
              }
              enemies.splice(j,1);
            }
            break;
          }
        }
        if (used) bullets.splice(i,1);
      }
      
      for (let i=0; i<enemies.length; i++) {
        const e = enemies[i];
        if (circlesCollide(player.x,player.y,player.r, e.x,e.y,e.r)) {
          damagePlayer(1);
          const ang = Math.atan2(e.y-player.y, e.x-player.x);
          e.x += Math.cos(ang)*30; e.y += Math.sin(ang)*30;
          const res = resolveEnemyCollision(e, e.x, e.y, i);
          e.x = res.x; e.y = res.y;
          if (player.hp<=0) { gameActive=false; gameOver=true; break; }
        }
      }
      
      for (let i=pickups.length-1; i>=0; i--) {
        const p = pickups[i];
        p.life--;
        if (p.life <= 0) { pickups.splice(i,1); continue; }
        if (circlesCollide(player.x,player.y,player.r, p.x,p.y,p.r)) {
          if (p.type === 'weapon') {
            player.currentWeapon = p.weaponType;
          } else if (p.type === 'health') {
            healPlayer(p.healAmount);
          }
          updateDisplay();
          pickups.splice(i,1);
        }
      }
      
      if (gameActive) {
        if (enemySpawnTimer<=0) {
          if (enemies.length < MAX_ENEMIES) spawnEnemyImmediate();
          enemySpawnTimer = ENEMY_SPAWN_RATE;
        } else enemySpawnTimer--;
      }
      
      if (player.hp<=0) { gameActive=false; gameOver=true; }
    }

    function getCanvasPos(touch) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (touch.clientX - rect.left) * scaleX,
        y: (touch.clientY - rect.top) * scaleY
      };
    }

    function distanceToJoystickCenter(pos) {
      const dx = pos.x - joystick.centerX;
      const dy = pos.y - joystick.centerY;
      return Math.hypot(dx, dy);
    }

    function updateJoystickFromPos(pos) {
      const dx = pos.x - joystick.centerX;
      const dy = pos.y - joystick.centerY;
      const dist = Math.hypot(dx, dy);
      if (dist < 3) {
        joystick.vectorX = 0; joystick.vectorY = 0;
      } else {
        const limited = Math.min(dist, joystick.maxDist) / joystick.maxDist;
        joystick.vectorX = (dx/dist) * limited;
        joystick.vectorY = (dy/dist) * limited;
      }
      shootPressed = (dist <= joystick.fireRadius);
    }

    function handleTouchStart(e) {
      e.preventDefault();
      for (let touch of e.touches) {
        const pos = getCanvasPos(touch);
        const dist = distanceToJoystickCenter(pos);
        if (dist <= joystick.activateRadius) {
          joystick.active = true;
          joystick.originX = pos.x;
          joystick.originY = pos.y;
          updateJoystickFromPos(pos);
          break;
        }
      }
    }

    function handleTouchMove(e) {
      e.preventDefault();
      if (!joystick.active) return;
      let bestDist = Infinity;
      let bestPos = null;
      for (let touch of e.touches) {
        const pos = getCanvasPos(touch);
        const dist = distanceToJoystickCenter(pos);
        if (dist < bestDist) {
          bestDist = dist;
          bestPos = pos;
        }
      }
      if (bestPos && bestDist <= joystick.activateRadius + 40) {
        updateJoystickFromPos(bestPos);
      } else {
        shootPressed = false;
      }
    }

    function handleTouchEnd(e) {
      e.preventDefault();
      let stillActive = false;
      for (let touch of e.touches) {
        const pos = getCanvasPos(touch);
        if (distanceToJoystickCenter(pos) <= joystick.activateRadius) {
          stillActive = true;
          break;
        }
      }
      if (!stillActive) {
        joystick.active = false;
        joystick.vectorX = 0; joystick.vectorY = 0;
        shootPressed = false;
      }
    }

    function drawUI() {
      const jcx = joystick.centerX, jcy = joystick.centerY;
      
      ctx.beginPath();
      ctx.arc(jcx, jcy, 130, 0, 2*Math.PI);
      ctx.fillStyle = '#1e2a36c0';
      ctx.strokeStyle = '#b9a98a';
      ctx.lineWidth = 4;
      ctx.fill();
      ctx.stroke();
      
      ctx.beginPath();
      ctx.arc(jcx, jcy, joystick.fireRadius, 0, 2*Math.PI);
      ctx.fillStyle = shootPressed ? '#ff444488' : '#66666644';
      ctx.fill();
      ctx.strokeStyle = '#ffcc88';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      const stickX = jcx + joystick.vectorX * joystick.maxDist;
      const stickY = jcy + joystick.vectorY * joystick.maxDist;
      ctx.beginPath();
      ctx.arc(stickX, stickY, 30, 0, 2*Math.PI);
      ctx.fillStyle = '#e0c090';
      ctx.shadowBlur = 22; ctx.shadowColor = '#ffbb33';
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'white';
      ctx.font = '28px "Segoe UI Emoji"';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('🕹️', stickX, stickY-1);
      
      ctx.font = 'bold 24px "Segoe UI"';
      ctx.fillStyle = '#f0e0c0';
      ctx.shadowBlur = 10; ctx.shadowColor = '#000';
      ctx.textAlign = 'center';
      ctx.fillText('←移動→', jcx, jcy - 140);
      ctx.fillText('開火', jcx, jcy + 140);
      ctx.shadowBlur = 0;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      
      ctx.fillStyle = '#0b1016'; ctx.fillRect(0,0,W,H);
      ctx.strokeStyle = '#1f2e3f'; ctx.lineWidth = 0.6;
      for (let i=0; i<W; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
      for (let i=0; i<H; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }
      
      for (let ob of obstacles) {
        ctx.shadowBlur=18; ctx.shadowColor='#000';
        ctx.font='42px "Segoe UI Emoji"'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ob.emoji, ob.x, ob.y);
      }
      
      for (let p of pickups) {
        ctx.shadowBlur=22; ctx.shadowColor=p.type==='health'?'#ff4444':'#ffaa00';
        ctx.font='34px "Segoe UI Emoji"';
        ctx.fillText(p.emoji, p.x, p.y);
      }
      
      for (let e of enemies) {
        ctx.shadowBlur=20; ctx.shadowColor=e.color+'cc';
        ctx.font='38px "Segoe UI Emoji"';
        ctx.fillText(e.emoji, e.x, e.y);
        if (e.hp > 1) {
          ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
          ctx.beginPath(); ctx.arc(e.x, e.y, e.r+4, 0, 2*Math.PI); ctx.stroke();
        }
      }
      
      for (let b of bullets) {
        ctx.shadowBlur=16; ctx.shadowColor='#ffaa33';
        ctx.font='24px "Segoe UI Emoji"';
        ctx.fillText(b.emoji, b.x, b.y);
      }
      
      let drawPlayer = true;
      if (player.invincible && (Math.floor(Date.now()/100)%2===0)) drawPlayer=false;
      if (drawPlayer) {
        ctx.shadowBlur=30; ctx.shadowColor='#3ad1ff';
        ctx.font='46px "Segoe UI Emoji"';
        ctx.fillText('🤠', player.x, player.y-2);
        ctx.font='28px "Segoe UI Emoji"';
        ctx.fillText(weaponTypes[player.currentWeapon].emoji, player.x+4, player.y-14);
      }
      ctx.shadowBlur=0;
      
      const aim = getAimTarget();
      if (aim) {
        ctx.beginPath();
        ctx.strokeStyle='#f0e6d2'; ctx.lineWidth=2.2;
        ctx.setLineDash([8,10]);
        ctx.moveTo(player.x, player.y);
        ctx.lineTo(aim.x, aim.y);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.beginPath();
        ctx.arc(aim.x, aim.y, aim.r+8, 0, 2*Math.PI);
        ctx.strokeStyle='#ffaa00'; ctx.lineWidth=3; ctx.stroke();
      }
      
      const grad = ctx.createRadialGradient(player.x,player.y,10,player.x,player.y,300);
      grad.addColorStop(0,'#eedd9930'); grad.addColorStop(0.7,'#1a1f2a10'); grad.addColorStop(1,'#0b1016f0');
      ctx.fillStyle=grad; ctx.globalCompositeOperation='overlay'; ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation='source-over';
      
      if (!gameActive && gameOver) {
        ctx.fillStyle='#000000cc'; ctx.fillRect(0,0,W,H);
        ctx.font='bold 48px "Segoe UI"'; ctx.fillStyle='#f0c0a0';
        ctx.shadowBlur=20; ctx.textAlign='center';
        ctx.fillText('💀 任務失敗 💀', W/2, H/2-30);
        ctx.font='32px sans-serif'; ctx.fillText('得分: '+score, W/2, H/2+40);
        ctx.shadowBlur=0;
      }
      
      drawUI();
    }

    function gameLoop() {
      if (gameActive) update();
      draw();
      frame = requestAnimationFrame(gameLoop);
    }

    function restartGame() {
      initWorld();
      updateDisplay();
    }

    canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
    canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
    canvas.addEventListener('touchend', handleTouchEnd);
    canvas.addEventListener('touchcancel', handleTouchEnd);
    canvas.addEventListener('contextmenu', e => e.preventDefault());
    restartBtn.addEventListener('click', restartGame);

    initWorld();
    updateDisplay();
    frame = requestAnimationFrame(gameLoop);
  })();
</script>
</body>
</html>
